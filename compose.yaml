services:
  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      APP_NAME: Estate CRM
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:${BACKEND_PORT:-8000}
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-estate_crm}
      DB_USERNAME: ${MYSQL_USER:-estate_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-estate_password}
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-estate_crm}
      MYSQL_USER: ${MYSQL_USER:-estate_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-estate_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  backend_vendor:
  frontend_node_modules:
  mysql_data:
